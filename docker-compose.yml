services:
  backoffice:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-backoffice:${APP_VERSION:-latest}
    container_name: gil-backoffice
    ports:
      - "${BACKOFFICE_HTTP_PORT:-8443}:80"
    volumes:
      - frontoffice_sp_metadata:/var/www/html/metadata-sp:ro
      - frontoffice_sp_metadata:/metadata/sp:ro
      - gil_certs:/var/www/certificate
      - gil_images:/var/www/html/public/img
      - gil_backups:/backups
      # Volumi per operazioni senza master container
      - gil_ssl_certs:/var/www/html/ssl-certs
      - spid_certs:/var/www/html/spid-certs
      - gil_cieoidc_keys:/var/www/html/cieoidc-keys
      - gil_metadata_cieoidc:/var/www/html/metadata-cieoidc
      - gil_metadata_agid:/var/www/html/metadata-agid
    environment:
      - APP_SUITE=backoffice
      - COMPOSER_VENDOR_DIR=/var/www/html/vendor
      - APACHE_SERVER_NAME=${APACHE_SERVER_NAME:-localhost}
      - SSL=${SSL:-off}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-govpay}
      - DB_USER=${BACKOFFICE_DB_USER:-govpay}
      - DB_PASSWORD=${BACKOFFICE_DB_PASSWORD}
      - DB_PASSWORD_CITTADINI=${FRONTOFFICE_DB_PASSWORD}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      # Token per autenticare le chiamate Bearer provenienti da auth-proxy/startup.sh
      - MASTER_TOKEN=${MASTER_TOKEN}
      - METADATA_BUILDER_INTERNAL_URL=${METADATA_BUILDER_INTERNAL_URL:-http://metadata-builder:8081}
    entrypoint: [ "/usr/local/bin/docker-setup.sh" ]
    restart: unless-stopped
    networks:
      - govpay-network

  frontoffice:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-frontoffice:${APP_VERSION:-latest}
    container_name: gil-frontoffice
    ports:
      - "${FRONTOFFICE_HTTP_PORT:-8444}:80"
    volumes:
      - frontoffice_sp_metadata:/var/www/html/metadata-sp:ro
      - frontoffice_sp_metadata:/metadata/sp:ro
      - spid_certs:/var/www/html/spid-certs:ro
      - gil_certs:/var/www/certificate:ro
      - gil_images:/var/www/html/public/img:ro
    environment:
      - APP_SUITE=frontoffice
      - COMPOSER_VENDOR_DIR=/var/www/html/vendor
      - APACHE_SERVER_NAME=${APACHE_SERVER_NAME:-localhost}
      - SSL=${SSL:-off}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-govpay}
      - DB_USER=${FRONTOFFICE_DB_USER:-govpay_cittadini}
      - DB_PASSWORD=${FRONTOFFICE_DB_PASSWORD}
      - DB_PASSWORD_CITTADINI=${FRONTOFFICE_DB_PASSWORD}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      - IAM_PROXY_SAML2_IDP_METADATA_URL_INTERNAL=${IAM_PROXY_SAML2_IDP_METADATA_URL_INTERNAL:-http://auth-proxy-nginx:80/Saml2IDP/metadata}
      - MASTER_TOKEN=${MASTER_TOKEN}
      - FRONTOFFICE_WATCHDOG_INTERVAL=${FRONTOFFICE_WATCHDOG_INTERVAL:-300}
    entrypoint: [ "/usr/local/bin/docker-setup.sh" ]
    restart: unless-stopped
    networks:
      - govpay-network

  auth-proxy:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-auth-proxy-italia:${APP_VERSION:-latest}
    container_name: gil-auth-proxy
    command: ["/bin/bash", "/builder/startup.sh"]
    volumes:
      # Chiavi JWK CIE OIDC (per-deployment, generate da backoffice UI o metadata-builder setup-cieoidc)
      - gil_cieoidc_keys:/cieoidc-keys:ro
      # SP metadata del frontoffice (rw: auth-proxy genera e scrive il metadata in startup.sh)
      - frontoffice_sp_metadata:/frontoffice-sp
      # Certificati SPID (per-deployment)
      - spid_certs:/satosa_proxy/pki
      # File statici condivisi con auth-proxy-nginx (popolati da startup.sh)
      - iam_proxy_static:/satosa-static
    environment:
      # Variabili infrastrutturali del container (non provengono dal DB)
      - SATOSA_BY_DOCKER=1
      - SATOSA_PRIVATE_KEY=${SATOSA_PRIVATE_KEY:-./pki/privkey.pem}
      - SATOSA_PUBLIC_KEY=${SATOSA_PUBLIC_KEY:-./pki/cert.pem}
      # Tuning params SP metadata (intervalli di check/validità — non configurabili da UI)
      - FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS=${FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS:-730}
      - FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS=${FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS:-604800}
      - FRONTOFFICE_SP_METADATA_FILE=${FRONTOFFICE_SP_METADATA_FILE:-/satosa_proxy/metadata/sp/frontoffice_sp.xml}
      - FRONTOFFICE_SP_METADATA_WARN_WINDOW_SECONDS=${FRONTOFFICE_SP_METADATA_WARN_WINDOW_SECONDS:-604800}
      - FRONTOFFICE_SP_METADATA_CHECK_INTERVAL_SECONDS=${FRONTOFFICE_SP_METADATA_CHECK_INTERVAL_SECONDS:-21600}
      # MongoDB — credenziali infrastrutturali container-to-container
      - MONGODB_USERNAME=${MONGODB_USERNAME:-satosa_user}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:-satosa_password}
      - MONGODB_HOST=${MONGODB_HOST:-auth-proxy-db}
      - MONGODB_PORT=${MONGODB_PORT:-27017}
      - MONGODB_DB=${MONGODB_DB:-satosa}
      # Tutte le variabili SATOSA/CIE OIDC/ENABLE_* vengono lette dal DB backoffice
      # tramite GET ${BACKOFFICE_INTERNAL_URL:-<derivato da SSL>}/api/auth-proxy/env all'avvio.
      - SSL=${SSL:-off}
      - BACKOFFICE_INTERNAL_URL=${BACKOFFICE_INTERNAL_URL:-}
      - MASTER_TOKEN=${MASTER_TOKEN}
      # Watchdog: intervallo polling config backoffice (secondi, default 300)
      - IAM_WATCHDOG_INTERVAL=${IAM_WATCHDOG_INTERVAL:-300}
    restart: always
    healthcheck:
      test: ["CMD", "test", "-f", "/satosa_proxy/entrypoint.sh"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 30s
    networks:
      - govpay-network

  auth-proxy-nginx:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-auth-proxy-nginx:${APP_VERSION:-latest}
    container_name: gil-auth-proxy-nginx
    depends_on:
      auth-proxy:
        condition: service_healthy
    ports:
      - "${IAM_PROXY_HTTP_PORT:-9445}:80"
    environment:
      # Variabili di rete/routing nginx (infrastrutturali)
      - IAM_PROXY_HOSTNAME=${IAM_PROXY_HOSTNAME:-auth-proxy-nginx}
      - IAM_PROXY_HTTP_PORT=${IAM_PROXY_HTTP_PORT:-9445}
      - SATOSA_HOSTNAME=${SATOSA_HOSTNAME:-auth-proxy-nginx}
      # I flag ENABLE_* non sono usati in nginx.conf: il disco.html viene già generato
      # con il contenuto corretto da auth-proxy/startup.sh (che li legge dal DB).
    volumes:
      # File statici SATOSA (disco.html, wallets, etc.) popolati da auth-proxy/startup.sh
      - iam_proxy_static:/satosa-project/static:ro
      # Certificati TLS server per-dominio
      - gil_ssl_certs:/etc/nginx/certs
    restart: 'no'
    networks:
      - govpay-network

  db:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-db:${APP_VERSION:-latest}
    container_name: gil-db
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_USER=${BACKOFFICE_DB_USER:-govpay}
      - MARIADB_PASSWORD=${BACKOFFICE_DB_PASSWORD}
      - MARIADB_DATABASE=${DB_NAME:-govpay}
      - DB_USER_CITTADINI=${FRONTOFFICE_DB_USER:-govpay_cittadini}
      - DB_PASSWORD_CITTADINI=${FRONTOFFICE_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - govpay-network

  auth-proxy-db:
    image: mongo:7
    container_name: gil-auth-proxy-db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USERNAME:-satosa_user}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-satosa_password}
      - MONGO_INITDB_DATABASE=${MONGODB_DB:-satosa}
    volumes:
      - satosa_mongo_data:/data/db
    restart: 'no'
    networks:
      - govpay-network

  metadata-builder:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-metadata-builder:${APP_VERSION:-latest}
    container_name: gil-metadata-builder
    command: ["server"]
    volumes:
      - spid_certs:/certs
      - frontoffice_sp_metadata:/sp-metadata
      - gil_cieoidc_keys:/output/cieoidc-keys
      - gil_metadata_agid:/output/agid
      - gil_metadata_cieoidc:/output/cieoidc
      - gil_backups:/backup
    environment:
      - MASTER_TOKEN=${MASTER_TOKEN}
      - SPID_CERT_KEY_SIZE=${SPID_CERT_KEY_SIZE:-3072}
      - SPID_CERT_COMMON_NAME=${SPID_CERT_COMMON_NAME:-}
      - SPID_CERT_DAYS=${SPID_CERT_DAYS:-730}
      - SPID_CERT_ENTITY_ID=${SPID_CERT_ENTITY_ID:-}
      - SPID_CERT_LOCALITY_NAME=${SPID_CERT_LOCALITY_NAME:-}
      - SPID_CERT_ORG_ID=${SPID_CERT_ORG_ID:-}
      - SPID_CERT_ORG_NAME=${SPID_CERT_ORG_NAME:-}
      - SPID_CERT_SECTOR=${SPID_CERT_SECTOR:-public}
      - SPID_CERTS_DOCKER_VOLUME=${SPID_CERTS_DOCKER_VOLUME:-govpay_spid_certs}
      - CIE_OIDC_CLIENT_ID=${CIE_OIDC_CLIENT_ID:-}
      - CIE_OIDC_CLIENT_NAME=${CIE_OIDC_CLIENT_NAME:-}
      - CIE_OIDC_ORGANIZATION_NAME=${CIE_OIDC_ORGANIZATION_NAME:-}
      - CIE_OIDC_JWKS_URI=${CIE_OIDC_JWKS_URI:-}
      - CIE_OIDC_SIGNED_JWKS_URI=${CIE_OIDC_SIGNED_JWKS_URI:-}
      - CIE_OIDC_REDIRECT_URI=${CIE_OIDC_REDIRECT_URI:-}
      - CIE_OIDC_FEDERATION_RESOLVE_ENDPOINT=${CIE_OIDC_FEDERATION_RESOLVE_ENDPOINT:-}
      - CIE_OIDC_FEDERATION_FETCH_ENDPOINT=${CIE_OIDC_FEDERATION_FETCH_ENDPOINT:-}
      - CIE_OIDC_FEDERATION_TRUST_MARK_STATUS_ENDPOINT=${CIE_OIDC_FEDERATION_TRUST_MARK_STATUS_ENDPOINT:-}
      - CIE_OIDC_FEDERATION_LIST_ENDPOINT=${CIE_OIDC_FEDERATION_LIST_ENDPOINT:-}
      - CIE_OIDC_HOMEPAGE_URI=${CIE_OIDC_HOMEPAGE_URI:-}
      - CIE_OIDC_POLICY_URI=${CIE_OIDC_POLICY_URI:-}
      - CIE_OIDC_LOGO_URI=${CIE_OIDC_LOGO_URI:-}
      - CIE_OIDC_CONTACT_EMAIL=${CIE_OIDC_CONTACT_EMAIL:-}
      - CIE_OIDC_PROVIDER_URL=${CIE_OIDC_PROVIDER_URL:-https://oidc.idserver.servizicie.interno.gov.it}
      - CIE_OIDC_TRUST_ANCHOR_URL=${CIE_OIDC_TRUST_ANCHOR_URL:-https://oidc.registry.servizicie.interno.gov.it}
      - CIE_OIDC_AUTHORITY_HINT_URL=${CIE_OIDC_AUTHORITY_HINT_URL:-https://oidc.registry.servizicie.interno.gov.it}
      - SATOSA_INTERNAL_HOSTNAME=${SATOSA_INTERNAL_HOSTNAME:-auth-proxy}
      - SATOSA_INTERNAL_PORT=${SATOSA_INTERNAL_PORT:-10000}
      - SATOSA_INTERNAL_SCHEME=${SATOSA_INTERNAL_SCHEME:-http}
      - SATOSA_HOSTNAME=${SATOSA_HOSTNAME:-auth-proxy-nginx}
      - SSL=${SSL:-off}
    networks:
      - govpay-network

networks:
  govpay-network:
    driver: bridge

volumes:
  db_data:
  satosa_mongo_data:
  frontoffice_sp_metadata:
  iam_proxy_static:
  spid_certs:
    name: ${SPID_CERTS_DOCKER_VOLUME:-govpay_spid_certs}
  # Archivi di backup — accessibili a backoffice e metadata-builder
  gil_backups:
  # Certificati GovPay (mTLS client cert+key) — RW backoffice, RO frontoffice
  gil_certs:
  # Immagini pubbliche ente (logo, favicon) — RW backoffice, RO frontoffice
  gil_images:
  # Certificati TLS server per auth-proxy-nginx (RW backoffice e auth-proxy-nginx per bootstrap)
  gil_ssl_certs:
  # Chiavi JWK CIE OIDC private per-deployment (generate da backoffice UI o metadata-builder setup-cieoidc)
  gil_cieoidc_keys:
  # Artefatti export AgID (metadata SPID pubblico)
  gil_metadata_agid:
  # Artefatti export CIE OIDC (entity configuration, JWKS)
  gil_metadata_cieoidc:
