server {
    listen 80 #SSL_MARKER#;
    server_name _;

    # DNS resolver for runtime upstream resolution (Docker default 127.0.0.11).
    # Override via NGINX_DNS_RESOLVER in rootless Podman environments.
    resolver #DNS_RESOLVER_MARKER# ipv6=off;
    resolver_timeout 5s;
    client_body_timeout 120s;
    client_header_timeout 120s;

#CERT_MARKER_1#
#CERT_MARKER_2#

    root /usr/share/nginx/html;

    # Root: internal rewrite to disco page (HTTP 200, no external 302).
    location = / {
        rewrite ^ /static/disco.html last;
    }

    # Alcuni validator chiamano il well-known di federazione alla root del dominio
    # anche quando l'entity identifier include un path. Riscrivi internamente verso
    # l'endpoint effettivo del componente CIE OIDC.
    location = /.well-known/openid-federation {
        rewrite ^ /CieOidcRp/.well-known/openid-federation last;
    }

    # File statici: servi dalla directory del progetto SATOSA (named volume iam_proxy_project)
    location /static/ {
        alias /satosa-project/static/;
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public";
    }

        # Endpoint CIE OIDC (federation, jwks, authorization, callback):
        # mantieni status HTTP originali (400/404/403/etc.) per compatibilita' protocollo.
        # Disabilita error_page intercept per evitare che 400/403 vengano convertiti in 200
        # (che romperebbe il flusso OIDC authorization e callback).
        location ^~ /CieOidcRp/ {
            include /etc/nginx/uwsgi_params;
            set $satosa_upstream auth-proxy:10000;
            uwsgi_pass $satosa_upstream;

            uwsgi_param Host $host;
            uwsgi_param X-Real-IP $remote_addr;
            uwsgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
            uwsgi_param X-Forwarded-Proto #PROTO_MARKER#;
            uwsgi_param HTTP_X_FORWARDED_PROTOCOL #PROTO_MARKER#;
            uwsgi_param SERVER_ADDR $server_addr;

            # Importante: non intercettare errori per alcun endpoint CIE OIDC.
            # Questo preserva i codici di stato corretti anche per oidc/callback, authorization, etc.
            uwsgi_intercept_errors off;
        }

    # Tutto il resto (browser flow): prova prima come file, poi proxy a SATOSA
    location / {
        try_files $uri $uri/index.html @satosa;
    }

    location @satosa {
      include /etc/nginx/uwsgi_params;
      set $satosa_upstream auth-proxy:10000;
      uwsgi_pass $satosa_upstream;

      uwsgi_param Host $host;
      uwsgi_param X-Real-IP $remote_addr;
      uwsgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
      uwsgi_param X-Forwarded-Proto #PROTO_MARKER#;
      uwsgi_param HTTP_X_FORWARDED_PROTOCOL #PROTO_MARKER#;

      uwsgi_connect_timeout 75s;
      uwsgi_read_timeout 40;
      uwsgi_buffer_size 128k;
      uwsgi_buffers 4 256k;
      uwsgi_busy_buffers_size 256k;
      uwsgi_param SERVER_ADDR $server_addr;

      # Intercetta gli errori HTTP restituiti da SATOSA (es. 403 su annullamento login)
      uwsgi_intercept_errors on;

    # Errori auth/funzionali da backend: restituisci sempre pagina locale HTTP 200.
    error_page 400 403 =200 /errors/cancel.html;
    # Retry on connection errors; render local courtesy page with HTTP 200.
    error_page 502 503 504 =200 /errors/50x.html;
    }

    error_page 404 =200 /errors/404.html;
    location = /errors/404.html {
        root /tmp;
        internal;
    }

    # 403 da SATOSA (login annullato o accesso negato): pagina user-friendly locale
    error_page 400 403 =200 /errors/cancel.html;
    location = /errors/cancel.html {
        root /tmp;
        # Accessibile anche via redirect diretto da SATOSA (Patch 2)
    }

    # Fallback locale 403 (nginx diretto, non da proxy)
    location = /errors/403.html {
        root /tmp;
        internal;
    }

    error_page 500 502 503 504 =200 /errors/50x.html;
    location = /errors/50x.html {
        root /tmp;
        internal;
    }
}

