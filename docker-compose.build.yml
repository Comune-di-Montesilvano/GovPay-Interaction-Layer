# Override per build locale delle immagini.
# Uso: docker compose -f docker-compose.yml -f docker-compose.build.yml build
# Oppure per avviare con build: docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
services:
  govpay-interaction-backoffice:
    build:
      context: .
      target: runtime-backoffice

  govpay-interaction-frontoffice:
    build:
      context: .
      target: runtime-frontoffice

  auth-proxy:
    build:
      context: .
      dockerfile: auth-proxy/Dockerfile

  auth-proxy-nginx:
    build:
      context: ./auth-proxy/nginx

  db:
    build:
      context: ./docker
      dockerfile: db/Dockerfile

  metadata-builder:
    build:
      context: .
      dockerfile: metadata/builder/Dockerfile
