name: Docker Publish

on:
  push:
    branches: [ "dev" ]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: comune-di-montesilvano
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── PHP apps: backoffice + frontoffice ────────────────────────────────────
  # Kept in one job: they share asset_builder / vendor_builder / runtime-base.
  # Buildx reuses intermediate layers in-memory → no redundant GHA round-trips.
  build-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version info
        id: version-info
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo_url="https://github.com/${GITHUB_REPOSITORY}"
          commit_url="${repo_url}/commit/${GITHUB_SHA}"

          version="development"
          version_type="development"
          version_label="development"
          ref_url=""

          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            version="dev"
            version_type="dev"
            version_label="dev@${GITHUB_SHA::7}"
            ref_url="${commit_url}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME}"
            version_label="${GITHUB_REF_NAME}"
            if curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
              >/dev/null; then
              version_type="release"
              ref_url="${repo_url}/releases/tag/${GITHUB_REF_NAME}"
            else
              version_type="tag"
              ref_url="${repo_url}/tree/${GITHUB_REF_NAME}"
            fi
          else
            version="${GITHUB_SHA::7}"
            version_type="commit"
            version_label="${GITHUB_SHA::7}"
            ref_url="${commit_url}"
          fi

          {
            echo "version=${version}"
            echo "version_type=${version_type}"
            echo "version_label=${version_label}"
            echo "ref_url=${ref_url}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── backoffice ──────────────────────────────────────────────────────
      - name: Meta · backoffice
        id: meta-bo
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-backoffice
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · backoffice
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-backoffice
          push: true
          tags: ${{ steps.meta-bo.outputs.tags }}
          labels: ${{ steps.meta-bo.outputs.labels }}
          build-args: |
            GIL_IMAGE_TAG=${{ steps.version-info.outputs.version }}
            GIL_VERSION_TYPE=${{ steps.version-info.outputs.version_type }}
            GIL_VERSION_LABEL=${{ steps.version-info.outputs.version_label }}
            GIL_REF_URL=${{ steps.version-info.outputs.ref_url }}
            GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=backoffice

      # ── frontoffice ─────────────────────────────────────────────────────
      - name: Meta · frontoffice
        id: meta-fo
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-frontoffice
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · frontoffice
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-frontoffice
          push: true
          tags: ${{ steps.meta-fo.outputs.tags }}
          labels: ${{ steps.meta-fo.outputs.labels }}
          build-args: |
            GIL_IMAGE_TAG=${{ steps.version-info.outputs.version }}
            GIL_VERSION_TYPE=${{ steps.version-info.outputs.version_type }}
            GIL_VERSION_LABEL=${{ steps.version-info.outputs.version_label }}
            GIL_REF_URL=${{ steps.version-info.outputs.ref_url }}
            GIT_COMMIT_SHA=${{ github.sha }}
          # also pull from backoffice scope: runtime-base layers already cached there
          cache-from: |
            type=gha,scope=frontoffice
            type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=frontoffice

  # ── Independent services: parallel matrix ─────────────────────────────────
  build-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: auth-proxy-italia
            context: .
            file: auth-proxy/Dockerfile
            scope: auth-proxy-italia
          - image: auth-proxy-nginx
            context: auth-proxy/nginx
            file: ""
            scope: auth-proxy-nginx
          - image: db
            context: docker
            file: docker/db/Dockerfile
            scope: db
          - image: metadata-builder
            context: .
            file: metadata/builder/Dockerfile
            scope: metadata-builder

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version info
        id: version-info
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo_url="https://github.com/${GITHUB_REPOSITORY}"
          commit_url="${repo_url}/commit/${GITHUB_SHA}"

          version="development"
          version_type="development"
          version_label="development"
          ref_url=""

          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            version="dev"
            version_type="dev"
            version_label="dev@${GITHUB_SHA::7}"
            ref_url="${commit_url}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME}"
            version_label="${GITHUB_REF_NAME}"
            if curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
              >/dev/null; then
              version_type="release"
              ref_url="${repo_url}/releases/tag/${GITHUB_REF_NAME}"
            else
              version_type="tag"
              ref_url="${repo_url}/tree/${GITHUB_REF_NAME}"
            fi
          else
            version="${GITHUB_SHA::7}"
            version_type="commit"
            version_label="${GITHUB_SHA::7}"
            ref_url="${commit_url}"
          fi

          {
            echo "version=${version}"
            echo "version_type=${version_type}"
            echo "version_label=${version_label}"
            echo "ref_url=${ref_url}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Meta · ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIL_IMAGE_TAG=${{ steps.version-info.outputs.version }}
            GIL_VERSION_TYPE=${{ steps.version-info.outputs.version_type }}
            GIL_VERSION_LABEL=${{ steps.version-info.outputs.version_label }}
            GIL_REF_URL=${{ steps.version-info.outputs.ref_url }}
            GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
