name: Docker Publish

on:
  push:
    branches: [ "dev" ]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: comune-di-montesilvano
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve version once, share outputs to all matrix jobs ───────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      version_type: ${{ steps.v.outputs.version_type }}
      version_label: ${{ steps.v.outputs.version_label }}
      ref_url: ${{ steps.v.outputs.ref_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve version info
        id: v
        uses: ./.github/actions/version-resolver
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── Shared PHP base cache warmup ───────────────────────────────────────────
  # Build the common runtime-base layer once so backoffice/frontoffice reuse
  # the expensive asset_builder/vendor_builder/runtime-base graph.
  build-php-base:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build shared PHP base cache
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-base
          push: false
          provenance: false
          sbom: false
          build-args: |
            GIL_IMAGE_TAG=cache-warmup
            GIL_VERSION_TYPE=cache-warmup
            GIL_VERSION_LABEL=cache-warmup
            GIL_REF_URL=
            GIT_COMMIT_SHA=cache-warmup
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-php-common-cache:main
            type=gha,scope=php-common
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-backoffice:dev
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-frontoffice:dev
          cache-to: |
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-php-common-cache:main,mode=max
            type=gha,mode=max,scope=php-common

  # ── PHP apps: backoffice + frontoffice (parallel matrix) ─────────────────
  # Shared layers are warmed by build-php-base and then reused per app.
  build-php:
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backoffice
            target: runtime-backoffice
            image_suffix: backoffice
            scope: backoffice
          - app: frontoffice
            target: runtime-frontoffice
            image_suffix: frontoffice
            scope: frontoffice
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Meta · ${{ matrix.app }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · ${{ matrix.app }}
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Disabilitati per risparmiare tempo di esecuzione e spazio registry
          provenance: false
          sbom: false
          build-args: |
            GIL_IMAGE_TAG=${{ needs.setup.outputs.version }}
            GIL_VERSION_TYPE=${{ needs.setup.outputs.version_type }}
            GIL_VERSION_LABEL=${{ needs.setup.outputs.version_label }}
            GIL_REF_URL=${{ needs.setup.outputs.ref_url }}
            GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-php-common-cache:main
            type=gha,scope=php-common
            type=gha,scope=${{ matrix.scope }}
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image_suffix }}-buildcache:main
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image_suffix }}:dev
          # mode=max protegge cache di composer e npm (stage intermedi); inline aggiunge
          # metadati cache nell'immagine per fallback registry su cache GHA evict
          cache-to: |
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image_suffix }}-buildcache:main,mode=max
            type=gha,mode=max,scope=${{ matrix.scope }}
            type=inline

  # ── Independent services: parallel matrix ─────────────────────────────────
  build-services:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: db
            context: docker
            file: docker/db/Dockerfile
            scope: db
            cache_mode: min

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Meta · ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Disabilitati per risparmiare tempo di esecuzione e spazio registry
          provenance: false
          sbom: false
          build-args: |
            GIL_IMAGE_TAG=${{ needs.setup.outputs.version }}
            GIL_VERSION_TYPE=${{ needs.setup.outputs.version_type }}
            GIL_VERSION_LABEL=${{ needs.setup.outputs.version_label }}
            GIL_REF_URL=${{ needs.setup.outputs.ref_url }}
            GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: |
            type=gha,scope=${{ matrix.scope }}
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image }}-cache:main
          # GHA cache: max per layer costosi (pip/git/curl), min per immagini triviali
          # Registry fallback: sopravvive all'eviction GHA (10GB limit)
          cache-to: |
            type=gha,mode=${{ matrix.cache_mode }},scope=${{ matrix.scope }}
            type=registry,ref=ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image }}-cache:main,mode=max