name: Docker Publish

on:
  push:
    branches: [ "dev" ]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: comune-di-montesilvano
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── PHP apps: backoffice + frontoffice (parallel matrix) ─────────────────
  # Shared layers (asset_builder, vendor_builder, runtime-base) are reused
  # via GHA cache cross-scope reference on frontoffice runner.
  build-php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backoffice
            target: runtime-backoffice
            image_suffix: backoffice
            scope: backoffice
          - app: frontoffice
            target: runtime-frontoffice
            image_suffix: frontoffice
            scope: frontoffice
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version info
        id: version-info
        uses: ./.github/actions/version-resolver
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Meta · ${{ matrix.app }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · ${{ matrix.app }}
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIL_IMAGE_TAG=${{ steps.version-info.outputs.version }}
            GIL_VERSION_TYPE=${{ steps.version-info.outputs.version_type }}
            GIL_VERSION_LABEL=${{ steps.version-info.outputs.version_label }}
            GIL_REF_URL=${{ steps.version-info.outputs.ref_url }}
            GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: |
            type=gha,scope=${{ matrix.scope }}
            ${{ matrix.scope == 'frontoffice' && 'type=gha,scope=backoffice' || '' }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}

  # ── Independent services: parallel matrix ─────────────────────────────────
  build-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: auth-proxy-italia
            context: .
            file: auth-proxy/Dockerfile
            scope: auth-proxy-italia
          - image: auth-proxy-nginx
            context: auth-proxy/nginx
            file: ""
            scope: auth-proxy-nginx
          - image: db
            context: docker
            file: docker/db/Dockerfile
            scope: db
          - image: metadata-builder
            context: .
            file: metadata/builder/Dockerfile
            scope: metadata-builder

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version info
        id: version-info
        uses: ./.github/actions/version-resolver
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Meta · ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIL_IMAGE_TAG=${{ steps.version-info.outputs.version }}
            GIL_VERSION_TYPE=${{ steps.version-info.outputs.version_type }}
            GIL_VERSION_LABEL=${{ steps.version-info.outputs.version_label }}
            GIL_REF_URL=${{ steps.version-info.outputs.ref_url }}
            GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
