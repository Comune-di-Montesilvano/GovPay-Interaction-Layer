name: Docker Publish

on:
  push:
    branches: [ "dev" ]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: comune-di-montesilvano

jobs:
  # ── PHP apps: backoffice + frontoffice ────────────────────────────────────
  # Kept in one job: they share asset_builder / vendor_builder / runtime-base.
  # Buildx reuses intermediate layers in-memory → no redundant GHA round-trips.
  build-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── backoffice ──────────────────────────────────────────────────────
      - name: Meta · backoffice
        id: meta-bo
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-backoffice
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · backoffice
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-backoffice
          push: true
          tags: ${{ steps.meta-bo.outputs.tags }}
          labels: ${{ steps.meta-bo.outputs.labels }}
          build-args: |
            GIL_IMAGE_TAG=${{ steps.meta-bo.outputs.version }}
            GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=backoffice

      # ── frontoffice ─────────────────────────────────────────────────────
      - name: Meta · frontoffice
        id: meta-fo
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-frontoffice
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · frontoffice
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-frontoffice
          push: true
          tags: ${{ steps.meta-fo.outputs.tags }}
          labels: ${{ steps.meta-fo.outputs.labels }}
          build-args: GIL_IMAGE_TAG=${{ steps.meta-fo.outputs.version }}
          # also pull from backoffice scope: runtime-base layers already cached there
          cache-from: |
            type=gha,scope=frontoffice
            type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=frontoffice

  # ── Independent services: parallel matrix ─────────────────────────────────
  build-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: iam-proxy-italia
            context: .
            file: iam-proxy/Dockerfile
            scope: iam-proxy-italia
          - image: iam-proxy-nginx
            context: iam-proxy/nginx
            file: ""
            scope: iam-proxy-nginx
          - image: db
            context: docker
            file: docker/db/Dockerfile
            scope: db
          - image: metadata-builder
            context: .
            file: metadata/builder/Dockerfile
            scope: metadata-builder
          - image: master
            context: master
            file: ""
            scope: master

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Meta · ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push · ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
